<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #faf9f7;
    --border: #e8e4de;
    --accent: #2d6a4f;
    --accent-light: #e8f4ee;
    --text: #1a1a18;
    --text-muted: #8a8880;
    --user-bg: #2d6a4f;
    --shadow: 0 2px 24px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(45,106,79,0.06) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(45,106,79,0.04) 0%, transparent 50%);
  }

  #app { width: 480px; max-width: 100%; animation: fadeUp 0.5s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #chat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    height: 580px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  #chat-header {
    padding: 18px 22px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 38px; height: 38px;
    background: var(--accent-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg { width: 20px; height: 20px; }

  .header-name { font-family: 'Lora', serif; font-weight: 500; font-size: 16px; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; display: flex; align-items: center; gap: 5px; }
  .online-dot { width: 6px; height: 6px; background: #40b07a; border-radius: 50%; animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .model-badge {
    margin-left: auto;
    font-size: 11px; color: var(--accent);
    background: var(--accent-light);
    padding: 3px 9px; border-radius: 20px; font-weight: 500;
  }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 18px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg-row { display: flex; gap: 10px; align-items: flex-end; animation: msgIn 0.25s ease both; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500; flex-shrink: 0;
  }

  .msg-row.bot .msg-avatar { background: var(--accent-light); color: var(--accent); }
  .msg-row.user .msg-avatar { background: #e8e4de; color: var(--text-muted); }

  .bubble {
    max-width: 78%; padding: 10px 14px;
    border-radius: 18px; font-size: 14.5px;
    line-height: 1.6; word-break: break-word;
  }

  .msg-row.bot .bubble {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-bottom-left-radius: 5px;
  }

  .msg-row.user .bubble {
    background: var(--user-bg); color: #fff;
    border-bottom-right-radius: 5px;
  }

  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing-dots span {
    width: 7px; height: 7px; background: var(--text-muted);
    border-radius: 50%; animation: bounce 1.3s infinite ease-in-out;
  }
  .typing-dots span:nth-child(2){animation-delay:.18s}
  .typing-dots span:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  #input-area {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface); flex-shrink: 0;
  }

  #user-input {
    flex: 1; border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 14px; font-size: 14px;
    font-family: 'DM Sans', sans-serif; color: var(--text);
    background: var(--surface2); resize: none; outline: none;
    line-height: 1.5; max-height: 120px; overflow-y: auto;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,106,79,0.08); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s, transform 0.1s;
  }

  #send-btn:hover { opacity: 0.88; }
  #send-btn:active { transform: scale(0.95); }
  #send-btn svg { width: 18px; height: 18px; }

  #footer-note { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 10px; }
</style>
</head>
<body>
<div id="app">
  <div id="chat-box">

    <div id="chat-header">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 3C12 3 5 8 5 14a7 7 0 0014 0C19 8 12 3 12 3z" fill="#2d6a4f" opacity="0.85"/>
          <path d="M12 10v8M9 14l3-4 3 4" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="header-name">Claude Assistant</div>
        <div class="header-sub"><span class="online-dot"></span> Ready to help</div>
      </div>
      <span class="model-badge">claude-haiku</span>
    </div>

    <div id="messages">
      <div class="msg-row bot">
        <div class="msg-avatar">C</div>
        <div class="bubble">Hello! I'm your Claude assistant. Ask me anything 🌿</div>
      </div>
    </div>

    <div id="input-area">
      <textarea id="user-input" rows="1" placeholder="Type a message…"></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
  <div id="footer-note">Powered by Claude · API key secured server-side</div>
</div>

<script>
  const SYSTEM_PROMPT = `You are a friendly, knowledgeable general-purpose assistant. Be helpful, clear, and concise.`;

  let history = [];
  let isLoading = false;

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function addMessage(role, text) {
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    row.innerHTML = `<div class="msg-avatar">${role === 'bot' ? 'C' : 'You'}</div><div class="bubble">${escHtml(text)}</div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot'; row.id = 'typing-row';
    row.innerHTML = `<div class="msg-avatar">C</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
  }

  async function send() {
    if (isLoading) return;
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage('user', text);
    history.push({ role: 'user', content: text });

    isLoading = true;
    sendBtn.style.opacity = '0.5';
    showTyping();

    try {
      const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await res.json();
      removeTyping();

      if (data.error) {
        addMessage('bot', '⚠️ ' + data.error.message);
        history.pop();
      } else {
        const reply = data.content.map(b => b.text || '').join('');
        history.push({ role: 'assistant', content: reply });
        addMessage('bot', reply);
      }
    } catch (err) {
      removeTyping();
      addMessage('bot', '⚠️ Something went wrong: ' + err.message);
      history.pop();
    } finally {
      isLoading = false;
      sendBtn.style.opacity = '1';
      inputEl.focus();
    }
  }
</script>
</body>
</html>
